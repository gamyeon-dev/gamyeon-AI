name: Agent Server CI/CD
on:
  push:
    branches:
      [
        "develop",
        "feat/*",
        "fix/*",
        "refactor/*",
        "chore/*",
        "docs/*",
        "test/*",
      ]

jobs:
  # 1. 공통 검증 단계 (CI)
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # lint
      - name: Check Code Style
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__

      # clean build
      - name: Run Tests
        run: |
          pip install pytest
          pytest --tb=short || true   # 테스트 없으면 true로 패스, 생기면 || true 제거

  # 2. 배포 단계 (CD) - develop
  deploy:
    needs: test-and-build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-agent:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-agent:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app

            # 컨테이너 중지
            docker-compose down agent-server || true

            # 기존 이미지 삭제
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-agent:latest || true

            # 새 이미지 pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-agent:latest

            # 컨테이너 재시작
            docker-compose up -d --no-deps agent-server

            # 이미지 찌꺼기 청소
            docker image prune -f
